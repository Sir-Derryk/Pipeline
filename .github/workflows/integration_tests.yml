name: Portal Integration Tests

on:
  push:
    branches: [ master ]  # Trigger on changes in the parent repository itself
  repository_dispatch:
    types: [ trigger-integration-tests ]  # Trigger on event dispatched from submodules

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PIPELINE_GITHUB_TOKEN || github.token }}
          submodules: 'recursive'  # Fetch all submodules recursively

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen hugo

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic jinja2 lxml

      - name: Compile Portal & Guides (VitePress & Hugo)
        env:
          PYTHONPATH: engine
        run: |
          # Create symlink for configuration path compatibility on Linux server
          ln -s ../engine ./user-docs/engine
          # 1. VitePress Build
          cd user-docs
          npm install
          npm run docs:build
          cd ..
          # 2. API Reference Generation via UDE
          python -m ude.cli --config ./user-docs/ude_config_self.json
          # 3. Compile Hugo API Reference into the nested subdirectory of VitePress dist
          cd user-docs/hugo-site
          echo "" >> hugo.toml
          echo "[permalinks]" >> hugo.toml
          echo "  api = \"/:filename/\"" >> hugo.toml
          hugo --destination ../.vitepress/dist/api
          cd ../..

      - name: Run Page Existence & Signature Verification
        run: |
          # Diagnostics: list all compiled files under the api directory to verify their structure
          find ./user-docs/.vitepress/dist/api/ -type f || true
          # Run our verification script against the locally compiled distribution
          python Tests/verify_pages.py --local-dir ./user-docs/.vitepress/dist

