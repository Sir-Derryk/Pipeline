name: Portal Integration Tests

on:
  push:
    branches: [ master ]  # Запуск при изменениях в самом родительском репозитории
  repository_dispatch:
    types: [ trigger-integration-tests ]  # Запуск по сигналу от сабмодулей

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PIPELINE_GITHUB_TOKEN || github.token }}
          submodules: 'recursive'  # Скачиваем абсолютно всё

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pydantic jinja2 lxml

      - name: Compile Portal & Guides (VitePress & Hugo)
        env:
          PYTHONPATH: engine
        run: |
          # Создаем симлинк для совместимости путей конфигурации на линукс-сервере
          ln -s ../engine ./user-docs/engine
          # 1. Сборка VitePress
          cd user-docs
          npm install
          npm run docs:build
          cd ..
          # 2. Сборка API-референса через UDE
          python -m ude.cli --config ./user-docs/ude_config_self.json

      - name: Run Page Existence & Signature Verification
        run: |
          # Запуск нашего скрипта верификации над собранным локальным дистрибутивом
          python Tests/verify_pages.py --local-dir ./user-docs/.vitepress/dist
